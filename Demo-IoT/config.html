<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Cấu Hình Kết Nối HiveMQ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row vh-100">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar py-4">
                <div class="position-sticky">
                    <ul class="nav flex-column">
                        <li class="nav-item mb-2">
                            <a class="nav-link active" aria-current="page" href="index.html">
                                <span class="me-2">🏠</span>
                                Trang chủ
                            </a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link active" aria-current="page" href="config.html">
                                <span class="me-2">&#9881;</span>
                                Cấu hình
                            </a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link" href="device.html">
                                <span class="me-2">&#128421;</span>
                                Thiết bị
                            </a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link" href="status.html">
                                <span class="me-2">&#128308;</span>
                                Trạng thái
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>
            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 d-flex align-items-center justify-content-center">
                <div class="w-100" style="max-width: 500px;">
                    <h2 class="mb-4 text-center">Cấu Hình Kết Nối HiveMQ</h2>
                    <form id="configForm">
                        <div class="mb-3">
                            <label for="brokerUrl" class="form-label">Broker URL</label>
                            <input type="text" class="form-control" id="brokerUrl" name="brokerUrl" required>
                        </div>
                        <div class="mb-3">
                            <label for="port" class="form-label">Port</label>
                            <input type="number" class="form-control" id="port" name="port" required>
                        </div>
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="text" class="form-control" id="password" name="password">
                        </div>
                        <div class="mb-3">
                            <label for="subscriptions" class="form-label">Subscriptions</label>
                            <input type="text" class="form-control" id="subscriptions" name="subscriptions" placeholder="Enter topics">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Lưu cấu hình</button>
                    </form>
                    <div id="saveMessage" class="alert alert-success mt-3 d-none" role="alert">
                        Đã lưu cấu hình thành công!
                    </div>
                </div>
            </main>
        </div>
    </div>
    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>// Load config from localStorage
    document.addEventListener('DOMContentLoaded', function () {
        const config = JSON.parse(localStorage.getItem('hivemqConfig') || '{}');
        if (config.brokerUrl) document.getElementById('brokerUrl').value = config.brokerUrl;
        if (config.port) document.getElementById('port').value = config.port;
        if (config.username) document.getElementById('username').value = config.username;
        if (config.password) document.getElementById('password').value = config.password;
        if (config.subscriptions) document.getElementById('subscriptions').value = config.subscriptions;
    });

    // Save config to localStorage
    document.getElementById('configForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const config = {
            brokerUrl: document.getElementById('brokerUrl').value,
            port: document.getElementById('port').value,
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
            subscriptions: document.getElementById('subscriptions').value
        };
        localStorage.setItem('hivemqConfig', JSON.stringify(config));
        document.getElementById('saveMessage').classList.remove('d-none');
        setTimeout(() => {
            document.getElementById('saveMessage').classList.add('d-none');
        }, 2000);
    });</script>
</body>
</html>
