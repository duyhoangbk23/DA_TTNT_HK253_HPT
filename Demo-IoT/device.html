<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Thiết Bị</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row vh-100">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar py-4">
                <div class="position-sticky">
                    <ul class="nav flex-column">
                        <li class="nav-item mb-2">
                            <a class="nav-link" href="index.html">
                                <span class="me-2">🏠</span>
                                Trang chủ
                            </a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link" href="config.html">
                                <span class="me-2">&#9881;</span>
                                Cấu hình
                            </a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link active" aria-current="page" href="device.html">
                                <span class="me-2">&#128421;</span>
                                Thiết bị
                            </a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link" href="status.html">
                                <span class="me-2">&#128308;</span>
                                Trạng thái
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>
            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2>Danh Sách Thiết Bị</h2>
                    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#deviceModal" onclick="openAddDeviceModal()">Thêm thiết bị</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-bordered align-middle" id="deviceTable">
                        <thead class="table-light">
                            <tr>
                                <th>Device ID</th>
                                <th>Product IMEI</th>
                                <th>Product Name</th>
                                <th>Customer</th>
                                <th>Address</th>
                                <th>Phone</th>
                                <th>Status</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Device rows will be injected here -->
                        </tbody>
                    </table>
                </div>
                <!-- Modal for Add/Edit Device -->
                <div class="modal fade" id="deviceModal" tabindex="-1" aria-labelledby="deviceModalLabel" aria-hidden="true">
                    <div class="modal-dialog">
                        <form class="modal-content" id="deviceForm">
                            <div class="modal-header">
                                <h5 class="modal-title" id="deviceModalLabel">Thêm thiết bị</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
                            </div>
                            <div class="modal-body">
                                <input type="hidden" id="editIndex">
                                <div class="mb-3">
                                    <label for="deviceId" class="form-label">Device ID</label>
                                    <input type="text" class="form-control" id="deviceId" required>
                                </div>
                                <div class="mb-3">
                                    <label for="productImei" class="form-label">Product IMEI</label>
                                    <input type="text" class="form-control" id="productImei" required>
                                </div>
                                <div class="mb-3">
                                    <label for="productName" class="form-label">Product Name</label>
                                    <input type="text" class="form-control" id="productName" required>
                                </div>
                                <div class="mb-3">
                                    <label for="customer" class="form-label">Customer</label>
                                    <input type="text" class="form-control" id="customer" required>
                                </div>
                                <div class="mb-3">
                                    <label for="address" class="form-label">Address</label>
                                    <input type="text" class="form-control" id="address" required>
                                </div>
                                <div class="mb-3">
                                    <label for="phone" class="form-label">Phone</label>
                                    <input type="text" class="form-control" id="phone" required>
                                </div>
                                <div class="mb-3">
                                    <label for="status" class="form-label">Status</label>
                                    <select class="form-select" id="status" required>
                                        <option value="Hoạt động">Hoạt động</option>
                                        <option value="Không hoạt động">Không hoạt động</option>
                                    </select>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                                <button type="submit" class="btn btn-primary">Lưu</button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Utility functions for localStorage
        function getDevices() {
            return JSON.parse(localStorage.getItem('devices') || '[]');
        }
        function saveDevices(devices) {
            localStorage.setItem('devices', JSON.stringify(devices));
        }

        // Render device table
        function renderDeviceTable() {
            const devices = getDevices();
            const tbody = document.querySelector('#deviceTable tbody');
            tbody.innerHTML = '';
            devices.forEach((device, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                        <td>${device.deviceId}</td>
                        <td>${device.productImei}</td>
                        <td style="width:200px">${device.productName}</td>
                        <td>${device.customer}</td>
                        <td>${device.address}</td>
                        <td>${device.phone}</td>
                        <td>${device.status}</td>
                        <td>
                            <button class="btn btn-sm btn-warning me-1" onclick="openEditDeviceModal(${idx})">Sửa</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteDevice(${idx})">Xóa</button>
                        </td>
                    `;
                tbody.appendChild(tr);
            });
        }

        // Open modal for adding device
        function openAddDeviceModal() {
            document.getElementById('deviceModalLabel').textContent = 'Thêm thiết bị';
            document.getElementById('deviceForm').reset();
            document.getElementById('editIndex').value = '';
        }

        // Open modal for editing device
        function openEditDeviceModal(index) {
            const devices = getDevices();
            const device = devices[index];
            document.getElementById('deviceModalLabel').textContent = 'Chỉnh sửa thiết bị';
            document.getElementById('editIndex').value = index;
            document.getElementById('deviceId').value = device.deviceId;
            document.getElementById('productImei').value = device.productImei;
            document.getElementById('productName').value = device.productName;
            document.getElementById('customer').value = device.customer;
            document.getElementById('address').value = device.address;
            document.getElementById('phone').value = device.phone;
            document.getElementById('status').value = device.status;
            const modal = new bootstrap.Modal(document.getElementById('deviceModal'));
            modal.show();
        }

        // Delete device
        function deleteDevice(index) {
            if (confirm('Bạn có chắc chắn muốn xóa thiết bị này?')) {
                const devices = getDevices();
                devices.splice(index, 1);
                saveDevices(devices);
                renderDeviceTable();
            }
        }

        // Handle form submit for add/edit
        document.getElementById('deviceForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const devices = getDevices();
            const device = {
                deviceId: document.getElementById('deviceId').value,
                productImei: document.getElementById('productImei').value,
                productName: document.getElementById('productName').value,
                customer: document.getElementById('customer').value,
                address: document.getElementById('address').value,
                phone: document.getElementById('phone').value,
                status: document.getElementById('status').value
            };
            const editIndex = document.getElementById('editIndex').value;
            if (editIndex === '') {
                devices.push(device);
            } else {
                devices[editIndex] = device;
            }
            saveDevices(devices);
            renderDeviceTable();
            bootstrap.Modal.getInstance(document.getElementById('deviceModal')).hide();
        });

        // Initial render
        document.addEventListener('DOMContentLoaded', renderDeviceTable);
    </script>
    <!-- ... (giữ nguyên phần cuối file) ... -->

</body>
</html>
