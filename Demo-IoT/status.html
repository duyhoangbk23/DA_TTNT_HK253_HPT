<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trạng Thái Kết Nối HiveMQ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- MQTT.js CDN -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>
    <div class="container-fluid">
        <div class="row vh-100">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar py-4">
                <div class="position-sticky">
                    <ul class="nav flex-column">
                        <li class="nav-item mb-2">
                            <a class="nav-link" href="index.html">
                                <span class="me-2">🏠</span>
                                Trang chủ
                            </a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link" href="config.html">
                                <span class="me-2">&#9881;</span>
                                Cấu hình
                            </a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link" href="device.html">
                                <span class="me-2">&#128421;</span>
                                Thiết bị
                            </a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link active" aria-current="page" href="status.html">
                                <span class="me-2">&#128308;</span>
                                Trạng thái
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>
            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="mb-3">
                    <h2>Trạng Thái Kết Nối HiveMQ</h2>
                    <div id="connectionInfo" class="mb-2"></div>
                    <div class="d-flex gap-2 mb-3">
                        <button class="btn btn-success" id="btnConnect">Kết nối</button>
                        <button class="btn btn-warning" id="btnDisconnect" disabled>Ngắt kết nối</button>
                        <button class="btn btn-danger" id="btnClear">Xóa dữ liệu</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-bordered align-middle" id="messageTable">
                        <thead class="table-light">
                            <tr>
                                <th>Thời gian</th>
                                <th>Topic</th>
                                <th>Dữ liệu (JSON)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Messages will be appended here -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>
    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>const MAX_MESSAGES = 10;
        let client = null;
        let isConnected = false;
        let hivemqConfig = {};
        let subscriptions = [];
        let messages = [];

        // Load config from localStorage
        function loadConfig() {
            hivemqConfig = JSON.parse(localStorage.getItem('hivemqConfig') || '{}');
            subscriptions = [];
            if (hivemqConfig.subscriptions) {
                subscriptions = hivemqConfig.subscriptions.split(',').map(s => s.trim()).filter(s => s);
            }
        }

        // Load messages from localStorage
        function loadMessages() {
            messages = JSON.parse(localStorage.getItem('hivemqMessages') || '[]');
        }

        // Save messages to localStorage
        function saveMessages() {
            localStorage.setItem('hivemqMessages', JSON.stringify(messages));
        }

        // Render connection info
        function renderConnectionInfo() {
            const infoDiv = document.getElementById('connectionInfo');
            if (!hivemqConfig.brokerUrl) {
                infoDiv.innerHTML = '<span class="text-danger">Chưa cấu hình kết nối HiveMQ.</span>';
                return;
            }
            infoDiv.innerHTML = `
                <strong>Broker:</strong> ${hivemqConfig.brokerUrl}:${hivemqConfig.port || ''} <br>
                <strong>Username:</strong> ${hivemqConfig.username || '-'} <br>
                <strong>Subscriptions:</strong> ${subscriptions.length > 0 ? subscriptions.join(', ') : '-'}
            `;
        }

        // Render messages table
        function renderMessages() {
            const tbody = document.querySelector('#messageTable tbody');
            tbody.innerHTML = '';
            messages.forEach(msg => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${msg.time}</td>
                    <td>${msg.topic}</td>
                    <td><pre class="mb-0" style="white-space: pre-wrap; word-break: break-all;">${msg.payload}</pre></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Append new message (on top)
        function appendMessage(topic, payload) {
            const now = new Date();
            const msg = {
                time: now.toLocaleString(),
                topic: topic,
                payload: payload
            };
            messages.unshift(msg);
            if (messages.length > MAX_MESSAGES) {
                messages = messages.slice(0, MAX_MESSAGES);
            }
            saveMessages();
            renderMessages();
        }

        // Connect to HiveMQ
        function connectMQTT() {
            if (isConnected || !hivemqConfig.brokerUrl || !hivemqConfig.port) return;
            let url = hivemqConfig.brokerUrl;
            if (!/^wss?:\/\//.test(url)) {
                url = 'wss://' + url;
            }
            url += ':' + hivemqConfig.port + '/mqtt';

            const options = {
                username: hivemqConfig.username || undefined,
                password: hivemqConfig.password || undefined,
                reconnectPeriod: 0 // No auto reconnect
            };

            client = mqtt.connect(url, options);

            client.on('connect', function () {
                isConnected = true;
                document.getElementById('btnConnect').disabled = true;
                document.getElementById('btnDisconnect').disabled = false;
                document.getElementById('connectionInfo').innerHTML += '<br><span class="text-success">Đã kết nối thành công!</span>';
                // Subscribe to topics
                subscriptions.forEach(topic => {
                    if (topic) client.subscribe(topic);
                });
            });

            client.on('message', function (topic, payload) {
                let text = payload.toString();
                // Try to pretty print JSON
                try {
                    const obj = JSON.parse(text);
                    text = JSON.stringify(obj, null, 2);
                } catch {}
                appendMessage(topic, text);
            });

            client.on('error', function (err) {
                document.getElementById('connectionInfo').innerHTML += `<br><span class="text-danger">Lỗi: ${err.message}</span>`;
            });

            client.on('close', function () {
                isConnected = false;
                document.getElementById('btnConnect').disabled = false;
                document.getElementById('btnDisconnect').disabled = true;
                document.getElementById('connectionInfo').innerHTML += '<br><span class="text-warning">Đã ngắt kết nối.</span>';
            });
        }

        // Disconnect from HiveMQ
        function disconnectMQTT() {
            if (client && isConnected) {
                client.end();
            }
        }

        // Clear messages
        function clearMessages() {
            messages = [];
            saveMessages();
            renderMessages();
        }

        // Button events
        document.addEventListener('DOMContentLoaded', function () {
            loadConfig();
            loadMessages();
            renderConnectionInfo();
            renderMessages();

            document.getElementById('btnConnect').addEventListener('click', connectMQTT);
            document.getElementById('btnDisconnect').addEventListener('click', disconnectMQTT);
            document.getElementById('btnClear').addEventListener('click', function () {
                if (confirm('Bạn có chắc chắn muốn xóa toàn bộ dữ liệu?')) {
                    clearMessages();
                }
            });
        });</script>
</body>
</html>
