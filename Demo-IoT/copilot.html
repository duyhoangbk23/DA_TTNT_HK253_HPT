<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giới Thiệu & Hướng Dẫn GitHub Copilot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .slide {
            display: none;
            min-height: 350px;
        }

            .slide.active {
                display: block;
                animation: fadeIn 0.5s;
            }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="mx-auto" style="max-width: 700px;">
            <div class="card shadow">
                <div class="card-body">
                    <div id="slides">
                        <!-- Slides will be injected here -->
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-4">
                        <button class="btn btn-secondary" id="prevBtn">Trước</button>
                        <span id="slideIndicator"></span>
                        <button class="btn btn-secondary" id="nextBtn">Tiếp</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>const slides = [

        `
    },
    {

        content: `
            <p>Nhấn <kbd>Alt</kbd> + <kbd>[</kbd> hoặc <kbd>Alt</kbd> + <kbd>]</kbd> để xem các đề xuất khác nhau.</p>
            <ul>
                <li>Chọn phương án phù hợp nhất với nhu cầu của bạn.</li>

    },
    {
        title: "Viết Hàm Theo Mô Tả",
        content: `
            <p>Chỉ cần viết mô tả hàm bằng tiếng Anh, Copilot sẽ tự động sinh mã.</p>
            <pre>// Calculate factorial of n
int Factorial(int n) { }</pre>
        `
    },
    {
        title: "Sinh Code Từ Comment",
        content: `

        `
    },
    {
        title: "Tích Hợp Với Nhiều Ngôn Ngữ",

                <li>Đề xuất code dựa trên hàng triệu dự án mã nguồn mở.</li>

        `
    },
    {
        title: "Tùy Chỉnh Đề Xuất",
        content: `

    {

        content: `
            <ul>
                <li>Làm sao để đăng ký Copilot? <br><strong>Trả lời:</strong> Đăng ký tại <a href="https://github.com/features/copilot" target="_blank">github.com/features/copilot</a></li>

            </ul>
        `
    },
    {
        title: "Tổng Kết",
        content: `
            <p><strong>GitHub Copilot</strong> giúp tăng tốc quá trình phát triển phần mềm, giảm thời gian viết code và nâng cao hiệu suất làm việc trong Visual Studio.</p>
            <p>Hãy trải nghiệm và tận dụng tối đa sức mạnh của AI trong lập trình!</p>
        `
    }
];

let current = 0;

function renderSlide(idx) {
   const slidesDiv = document.getElementById('slides');
   slidesDiv.innerHTML = slides.map((s, i) => `
       <div class="slide${i === idx ? ' active' : ''}">
           <h4 class="mb-3">${s.title}</h4>
           ${s.content}
       </div>
   `).join('');
   document.getElementById('slideIndicator').textContent = `Slide ${idx + 1} / ${slides.length}`;
   document.getElementById('prevBtn').disabled = idx === 0;
   document.getElementById('nextBtn').disabled = idx === slides.length - 1;

   // Change background color based on the slide index
   const colors = ['#f8f9fa', '#e9ecef', '#dee2e6', '#ced4da', '#adb5bd'];
   document.body.style.backgroundColor = colors[idx % colors.length];
}

document.getElementById('prevBtn').onclick = function() {
    if (current > 0) {
        current--;
        renderSlide(current);
    }
};
document.getElementById('nextBtn').onclick = function() {
    if (current < slides.length - 1) {
        current++;
        renderSlide(current);
    }
};

renderSlide(current);</script>
</body>
</html>
